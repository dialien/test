<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>公司入口網站</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#f5f7fb;
      padding:30px;
    }

    header{
      text-align:center;
      margin-bottom:40px;
    }

    h1{
      margin-bottom:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(250px,1fr));

      gap:20px;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      text-decoration:none;
      color:#333;

      box-shadow:
      0 5px 15px rgba(0,0,0,0.1);

      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card h2{
      margin-bottom:10px;
    }

  </style>
</head>

<body>

<header>
  <h1>公司表單入口網站</h1>
  <p>請選擇要前往的系統</p>
</header>

<div class="grid">

  <a class="card"
     href="https://你的GoogleForm1"
     target="_blank">

    <h2>IT設備申請</h2>
    <p>設備與 MAC Address 申請</p>

  </a>

  <a class="card"
     href="https://你的GoogleForm2"
     target="_blank">

    <h2>HR 人事表單</h2>
    <p>人事資料與文件上傳</p>

  </a>

  <a class="card"
     href="https://你的Notion說明頁"
     target="_blank">

    <h2>系統說明</h2>
    <p>查看教學與 SOP</p>

  </a>

</div>

</body>
</html>
