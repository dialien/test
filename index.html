<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公司表單入口網站</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: #f8fafc;
      background:
        radial-gradient(circle at 20% 20%, rgba(99, 102, 241, .35), transparent 28%),
        radial-gradient(circle at 80% 30%, rgba(236, 72, 153, .28), transparent 30%),
        radial-gradient(circle at 50% 85%, rgba(34, 211, 238, .22), transparent 34%),
        linear-gradient(135deg, #020617, #111827 45%, #1e1b4b);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .page {
      width: min(1100px, 100%);
      position: relative;
    }

    .glow {
      position: absolute;
      inset: -80px;
      background: linear-gradient(120deg, rgba(255,255,255,.08), transparent);
      filter: blur(50px);
      pointer-events: none;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(12px);
      font-size: 14px;
      letter-spacing: .08em;
      color: #c4b5fd;
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(36px, 6vw, 72px);
      line-height: 1.05;
      letter-spacing: -0.06em;
      margin-bottom: 18px;
    }

    .gradient-text {
      background: linear-gradient(90deg, #fff, #a5b4fc, #f0abfc, #67e8f9);
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1.8;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      position: relative;
      z-index: 1;
    }

    .card {
      min-height: 260px;
      padding: 28px;
      border-radius: 30px;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 24px 80px rgba(0,0,0,.28);
      backdrop-filter: blur(18px);
      transition: transform .35s ease, background .35s ease, border-color .35s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      right: -60px;
      top: -60px;
      background: var(--accent);
      opacity: .35;
      filter: blur(8px);
      transition: transform .35s ease, opacity .35s ease;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
      background: rgba(255,255,255,.14);
      border-color: rgba(255,255,255,.35);
    }

    .card:hover::before {
      transform: scale(1.25);
      opacity: .55;
    }

    .icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: rgba(255,255,255,.13);
      margin-bottom: 34px;
      font-size: 28px;
      position: relative;
      z-index: 1;
    }

    .card h2 {
      font-size: 24px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .card p {
      color: #dbeafe;
      line-height: 1.7;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .link {
      position: absolute;
      left: 28px;
      bottom: 28px;
      font-weight: 700;
      color: #fff;
      z-index: 1;
    }

    footer {
      text-align: center;
      margin-top: 42px;
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 850px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="glow"></div>

    <header>
      <div class="badge">INTERNAL PORTAL</div>
      <h1><span class="gradient-text">公司表單入口網站</span></h1>
      <p class="subtitle">
        請選擇要前往的系統。<br />
        快速、安全、集中管理你的日常申請流程。
      </p>
    </header>

    <section class="cards">
      <a class="card" style="--accent: #818cf8;" href="你的GoogleForm1" target="_blank">
        <div class="icon">💻</div>
        <h2>IT 設備申請</h2>
        <p>設備需求、MAC Address、權限與相關資訊申請。</p>
        <span class="link">前往申請 →</span>
      </a>

      <a class="card" style="--accent: #f472b6;" href="你的GoogleForm2" target="_blank">
        <div class="icon">👥</div>
        <h2>HR 人事表單</h2>
        <p>人事資料、文件上傳、員工資訊與行政流程。</p>
        <span class="link">前往填寫 →</span>
      </a>

      <a class="card" style="--accent: #22d3ee;" href="你的Notion說明頁" target="_blank">
        <div class="icon">📘</div>
        <h2>系統說明</h2>
        <p>查看操作教學、SOP、常見問題與內部規範。</p>
        <span class="link">查看說明 →</span>
      </a>
    </section>

    <footer>
      © 2026 Company Portal. Designed for clarity and flow.
    </footer>
  </main>
</body>
</html>
